<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Devsloop</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrites, so a direct link or a
      // refresh on any route other than "/" 404s. This re-encodes the path
      // into a query string and redirects to index.html, which decodes it
      // back (see the matching inline script in index.html) before React
      // Router reads the URL.
      var pathSegmentsToKeep = 1; // "/Software-House-website"
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
