<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a2038"/><stop offset="1" stop-color="#132845"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)"/>
  <circle cx="360" cy="40" r="90" fill="#4fb88b" opacity="0.1"/>
  <circle cx="20" cy="270" r="80" fill="#4fb88b" opacity="0.1"/>

  <!-- two people at a table facing a large screen -->
  <rect x="130" y="70" width="180" height="120" rx="10" fill="#132845" stroke="#264a6b" stroke-width="2"/>
  <rect x="146" y="86" width="148" height="88" rx="6" fill="#0a2038"/>
  <rect x="160" y="98" width="60" height="8" rx="4" fill="#4fb88b"/>
  <rect x="160" y="114" width="120" height="30" rx="5" fill="#1a3a5c"/>
  <circle cx="180" cy="129" r="8" fill="#4fb88b"/>
  <rect x="196" y="122" width="70" height="6" rx="3" fill="#5b7791"/>
  <rect x="196" y="132" width="50" height="6" rx="3" fill="#5b7791"/>
  <rect x="160" y="152" width="40" height="10" rx="5" fill="#4fb88b"/>
  <rect x="208" y="152" width="40" height="10" rx="5" fill="#264a6b"/>
  <rect x="204" y="190" width="12" height="14" fill="#264a6b"/>
  <rect x="184" y="204" width="52" height="8" rx="4" fill="#0a2038"/>

  <!-- left person silhouette -->
  <circle cx="96" cy="196" r="20" fill="#4fb88b" opacity="0.85"/>
  <path d="M64 260 q32 -40 64 0 z" fill="#4fb88b" opacity="0.85"/>

  <!-- right person silhouette -->
  <circle cx="304" cy="196" r="20" fill="#ffffff" opacity="0.85"/>
  <path d="M272 260 q32 -40 64 0 z" fill="#ffffff" opacity="0.85"/>

  <!-- floating design chips -->
  <rect x="60" y="90" width="34" height="24" rx="6" fill="#264a6b"/>
  <circle cx="77" cy="102" r="6" fill="#4fb88b"/>
  <rect x="316" y="90" width="34" height="24" rx="6" fill="#264a6b"/>
  <rect x="324" y="98" width="18" height="8" rx="3" fill="#4fb88b"/>
</svg>
