<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103b63"/><stop offset="1" stop-color="#0a2038"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17242f"/><stop offset="1" stop-color="#0a2038"/>
    </linearGradient>
  </defs>
  <rect width="640" height="560" rx="24" fill="url(#bg)"/>
  <circle cx="560" cy="60" r="110" fill="#4fb88b" opacity="0.1"/>
  <circle cx="50" cy="500" r="130" fill="#4fb88b" opacity="0.08"/>

  <!-- window / wall panel with a chart, like an office backdrop -->
  <rect x="60" y="60" width="200" height="140" rx="10" fill="#132845" stroke="#264a6b" stroke-width="2"/>
  <rect x="76" y="76" width="90" height="8" rx="4" fill="#4fb88b"/>
  <polyline points="76,168 106,140 130,152 158,116 184,130" fill="none" stroke="#4fb88b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- plant -->
  <rect x="560" y="380" width="28" height="40" rx="4" fill="#264a6b"/>
  <path d="M574 380 q-24 -30 -6 -60" stroke="#4fb88b" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M574 380 q24 -24 10 -56" stroke="#4fb88b" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M574 380 q0 -34 0 -64" stroke="#4fb88b" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- table -->
  <path d="M40 420 h560 l-40 90 h-480 Z" fill="url(#table)" stroke="#264a6b" stroke-width="2"/>
  <ellipse cx="320" cy="420" rx="280" ry="14" fill="#1d3348"/>

  <!-- laptop in the middle -->
  <rect x="270" y="372" width="100" height="66" rx="6" fill="#0a2038" stroke="#4fb88b" stroke-width="2"/>
  <rect x="280" y="382" width="80" height="40" rx="3" fill="#132845"/>
  <rect x="288" y="390" width="40" height="6" rx="3" fill="#4fb88b"/>
  <rect x="288" y="402" width="60" height="5" rx="2.5" fill="#5b7791"/>
  <rect x="260" y="438" width="120" height="8" rx="4" fill="#17242f"/>

  <!-- documents on table -->
  <rect x="150" y="404" width="60" height="40" rx="4" fill="#f7fafc" opacity="0.9"/>
  <rect x="158" y="412" width="32" height="4" rx="2" fill="#9fb3c4"/>
  <rect x="158" y="420" width="40" height="4" rx="2" fill="#9fb3c4"/>
  <rect x="430" y="406" width="56" height="36" rx="4" fill="#f7fafc" opacity="0.9"/>
  <circle cx="448" cy="424" r="10" fill="#4fb88b" opacity="0.7"/>

  <!-- four people seated around the table, flat silhouettes -->
  <g>
    <circle cx="130" cy="330" r="26" fill="#4fb88b"/>
    <path d="M84 420 q46 -54 92 0 z" fill="#4fb88b"/>
  </g>
  <g>
    <circle cx="250" cy="308" r="26" fill="#ffffff" opacity="0.92"/>
    <path d="M204 420 q46 -66 92 0 z" fill="#ffffff" opacity="0.92"/>
  </g>
  <g>
    <circle cx="400" cy="308" r="26" fill="#264a6b"/>
    <path d="M354 420 q46 -66 92 0 z" fill="#264a6b"/>
  </g>
  <g>
    <circle cx="510" cy="330" r="26" fill="#ffffff" opacity="0.7"/>
    <path d="M464 420 q46 -54 92 0 z" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- speech / idea accents -->
  <circle cx="180" cy="260" r="5" fill="#4fb88b"/>
  <circle cx="196" cy="248" r="3" fill="#4fb88b"/>
  <circle cx="460" cy="256" r="5" fill="#4fb88b"/>
  <circle cx="444" cy="244" r="3" fill="#4fb88b"/>
</svg>
